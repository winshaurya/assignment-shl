<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" style="background-color: #0b0f19; font-family: monospace;">
  <!-- Definitions for Gradients -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #38bdf8; stop-opacity: 1;" />
      <stop offset="100%" style="stop-color: #0369a1; stop-opacity: 1;" />
    </linearGradient>
    <linearGradient id="indigoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #818cf8; stop-opacity: 1;" />
      <stop offset="100%" style="stop-color: #4338ca; stop-opacity: 1;" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #c084fc; stop-opacity: 1;" />
      <stop offset="100%" style="stop-color: #6b21a8; stop-opacity: 1;" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="30" y="40" fill="#f1f5f9" font-size="16" font-weight="bold" letter-spacing="1">CONVERSATIONAL RAG SYSTEM ARCHITECTURE</text>
  
  <!-- Outer Connector lines -->
  <path d="M 160 200 L 220 200" stroke="#475569" stroke-width="2" stroke-dasharray="4,4" fill="none" />
  <path d="M 380 140 L 460 200" stroke="#475569" stroke-width="2" fill="none" />
  <path d="M 380 260 L 460 200" stroke="#475569" stroke-width="2" fill="none" />
  <path d="M 620 200 L 680 200" stroke="#38bdf8" stroke-width="2" fill="none" />

  <!-- Node 1: User Request -->
  <rect x="30" y="150" width="130" height="100" rx="8" fill="url(#blueGrad)" stroke="#0284c7" stroke-width="1.5" />
  <text x="95" y="195" fill="#ffffff" font-size="11" font-weight="bold" text-anchor="middle">API GATEWAY</text>
  <text x="95" y="215" fill="#e0f2fe" font-size="10" text-anchor="middle">/chat (Stateless)</text>

  <!-- Node 2: Stage 1 Intent Parsing -->
  <rect x="220" y="90" width="160" height="100" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" />
  <text x="300" y="125" fill="#f1f5f9" font-size="11" font-weight="bold" text-anchor="middle">STAGE 1: INTENT AGENT</text>
  <text x="300" y="145" fill="#94a3b8" font-size="10" text-anchor="middle">Extract Filters</text>
  <text x="300" y="160" fill="#94a3b8" font-size="10" text-anchor="middle">&amp; Safety Guardrails</text>

  <!-- Node 3: Stage 2 Retriever -->
  <rect x="220" y="210" width="160" height="100" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5" />
  <text x="300" y="245" fill="#f1f5f9" font-size="11" font-weight="bold" text-anchor="middle">STAGE 2: RETRIEVER</text>
  <text x="300" y="265" fill="#94a3b8" font-size="10" text-anchor="middle">Hybrid Semantic Index</text>
  <text x="300" y="280" fill="#94a3b8" font-size="10" text-anchor="middle">BM25 + FAISS Vector</text>

  <!-- Node 4: Stage 3 Grounding -->
  <rect x="460" y="150" width="160" height="100" rx="8" fill="url(#indigoGrad)" stroke="#4f46e5" stroke-width="1.5" />
  <text x="540" y="185" fill="#ffffff" font-size="11" font-weight="bold" text-anchor="middle">STAGE 3: GROUNDING</text>
  <text x="540" y="205" fill="#e0e7ff" font-size="10" text-anchor="middle">Gemini LLM Synthesis</text>
  <text x="540" y="220" fill="#e0e7ff" font-size="9" text-anchor="middle">(Structured Output)</text>

  <!-- Node 5: Output Payload -->
  <rect x="680" y="150" width="100" height="100" rx="8" fill="url(#purpleGrad)" stroke="#7e22ce" stroke-width="1.5" />
  <text x="730" y="195" fill="#ffffff" font-size="11" font-weight="bold" text-anchor="middle">OUTPUT</text>
  <text x="730" y="215" fill="#f3e8ff" font-size="10" text-anchor="middle">Shortlist JSON</text>
</svg>
